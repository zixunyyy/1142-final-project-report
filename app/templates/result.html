{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card card-custom p-4 mt-5">
            <h3 class="fw-bold text-center mb-4">分析結果</h3>
            
            <div class="mb-4">
                <h6 class="text-muted fw-semibold">您輸入的文字：</h6>
                <div class="p-3 bg-light rounded border fs-5">
                    "{{ data.user_text }}"
                </div>
            </div>
            
            <div class="row mb-4">
                <div class="col-6">
                    <h6 class="text-muted fw-semibold">情緒色彩：</h6>
                    <span class="emotion-tag emotion-{{ data.emotion }}">
                        {% if data.emotion == 'Positive' %}<i class="fa-solid fa-face-laugh-squint me-1"></i> 正向
                        {% elif data.emotion == 'Negative' %}<i class="fa-solid fa-face-sad-tear me-1"></i> 負向
                        {% else %}<i class="fa-solid fa-face-meh me-1"></i> 中性{% endif %}
                    </span>
                </div>
                <div class="col-6">
                    <h6 class="text-muted fw-semibold">情緒強度：</h6>
                    <div class="d-flex align-items-center">
                        <div class="progress w-100 me-2" style="height: 10px;">
                            <div class="progress-bar {% if data.emotion == 'Positive' %}bg-success{% elif data.emotion == 'Negative' %}bg-danger{% else %}bg-secondary{% endif %}" 
                                 role="progressbar" style="width: {{ data.intensity }}%;" 
                                 aria-valuenow="{{ data.intensity }}" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        <span class="fw-bold">{{ data.intensity }}%</span>
                    </div>
                </div>
            </div>
            
            <div class="mb-4">
                <h6 class="text-muted fw-semibold"><i class="fa-solid fa-lightbulb text-warning me-1"></i> 社交回應建議：</h6>
                <div class="p-3 bg-white rounded border border-info shadow-sm">
                    {{ data.suggestion }}
                </div>
            </div>
            
            <div class="d-flex justify-content-between mt-4">
                <a href="{{ url_for('index.index') }}" class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="fa-solid fa-arrow-rotate-left me-1"></i> 再測一次
                </a>
                <a href="{{ url_for('index.dashboard') }}" class="btn btn-primary-custom text-white rounded-pill px-4">
                    <i class="fa-solid fa-chart-line me-1"></i> 查看儀表板
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
