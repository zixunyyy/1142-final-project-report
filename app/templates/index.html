{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card card-custom p-4 mt-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark"><i class="fa-regular fa-face-smile-beam text-primary me-2"></i>記錄當下心情</h2>
                <p class="text-muted">輸入一段文字，我們的 AI 將為您分析情感並提供社交回應建議。</p>
            </div>
            
            <form action="{{ url_for('analyze.analyze') }}" method="POST">
                <div class="mb-4">
                    <label for="user_text" class="form-label fw-semibold text-secondary">想說些什麼？</label>
                    <textarea class="form-control fs-5" id="user_text" name="user_text" rows="5" placeholder="例如：今天開會好順利，真的很開心！" required></textarea>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary-custom btn-lg text-white">
                        <i class="fa-solid fa-wand-magic-sparkles me-2"></i>開始情緒分析
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
